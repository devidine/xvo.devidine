<!DOCTYPE html>
<html>
<head>
  <title>아이디 목록</title>
</head>
<body>

<h2>등록된 아이디</h2>
<ul id="list"></ul>

<script>
fetch("users.json")
  .then(res => res.json())
  .then(data => {
    const ul = document.getElementById("list");

    data.forEach(id => {
      const li = document.createElement("li");
      li.innerText = id;
      ul.appendChild(li);
    });
  });
</script>

</body>
</html>
