<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo6-4TyKLDlWzem_53jWvZU5lE7mg3W8Q",
  authDomain: "devid-3f374.firebaseapp.com",
  projectId: "devid-3f374",
  storageBucket: "devid-3f374.firebasestorage.app",
  messagingSenderId: "143462587610",
  appId: "1:143462587610:web:10e9c6c02d6579c58a59e3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 핵심: window 붙이기
window.addUser = async function() {
  const id = document.getElementById("idInput").value;

  await addDoc(collection(db, "users"), {
    id: id
  });

  loadUsers();
}

window.loadUsers = async function() {
  const querySnapshot = await getDocs(collection(db, "users"));
  const keyword = document.getElementById("search").value;

  const ul = document.getElementById("list");
  ul.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    if (!data.id.includes(keyword)) return;

    const li = document.createElement("li");
    li.innerHTML = `
      ${data.id}
      <button onclick="deleteUser('${docSnap.id}')">삭제</button>
    `;
    ul.appendChild(li);
  });
}

window.deleteUser = async function(docId) {
  await deleteDoc(doc(db, "users", docId));
  loadUsers();
}

loadUsers();
</script>
